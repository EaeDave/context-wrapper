name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege — tests only need checkout
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # pins: full SHA (tag comment for humans); renovate/dependabot can bump
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install Python deps
        run: uv sync --group dev

      - name: Build frontend (wheel force-include needs dist/)
        run: |
          cd frontend
          bun install --frozen-lockfile
          bun run build

      - name: Ruff
        # tests ainda têm F401/F841 legados; gate no package product first
        run: uv run ruff check src

      - name: Pytest
        run: uv run pytest -q

      - name: Typecheck frontend
        run: |
          cd frontend
          bun run typecheck
